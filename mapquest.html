<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🚗 Advanced MapQuest Route Finder</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      color: #333;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
      color: white;
      padding: 40px;
      text-align: center;
    }

    .header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .header p {
      font-size: 1.1rem;
      opacity: 0.9;
    }

    .input-section {
      padding: 50px 40px;
      background: #f8fafc;
    }

    .input-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      margin-bottom: 30px;
    }

    .input-field {
      position: relative;
    }

    .input-field label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #475569;
      font-size: 0.95rem;
    }

    .input-field input {
      width: 100%;
      padding: 16px 20px 16px 50px;
      border: 2px solid #e2e8f0;
      border-radius: 16px;
      font-size: 1rem;
      transition: all 0.3s ease;
      background: white;
    }

    .input-field input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
    }

    .input-field i {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: #64748b;
      font-size: 1.1rem;
    }

    .btn-group {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 16px 32px;
      border: none;
      border-radius: 16px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
      color: white;
      box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 15px 35px rgba(59, 130, 246, 0.6);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
      color: #475569;
    }

    .btn-secondary:hover {
      transform: translateY(-2px);
      background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%);
    }

    .error-msg {
      background: #fee2e2;
      color: #dc2626;
      padding: 15px 20px;
      border-radius: 12px;
      margin-top: 20px;
      border-left: 4px solid #ef4444;
      display: none;
    }

    .success-msg {
      background: #dcfce7;
      color: #166534;
      padding: 15px 20px;
      border-radius: 12px;
      margin-top: 20px;
      border-left: 4px solid #22c55e;
      display: none;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin: 30px 0;
      display: none;
    }

    .stat-card {
      background: white;
      padding: 25px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease;
    }

    .stat-card:hover {
      transform: translateY(-5px);
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: #1e293b;
    }

    .stat-label {
      color: #64748b;
      font-weight: 500;
    }

    .results-section {
      padding: 0 40px 50px;
    }

    .table-container {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      display: none;
    }

    .table-header {
      background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
      color: white;
      padding: 25px 30px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      padding: 20px 15px;
      text-align: left;
      font-weight: 600;
      color: #1e293b;
      background: #f8fafc;
    }

    td {
      padding: 20px 15px;
    }

    tr:hover {
      background: #f8fafc;
    }

    .status-success { 
      color: #10b981; 
      font-weight: 600; 
    }

    .status-error { 
      color: #ef4444; 
      font-weight: 600; 
    }

    .loading {
      display: none;
      text-align: center;
      padding: 40px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #3b82f6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
      .input-group {
        grid-template-columns: 1fr;
      }
      .header h1 { font-size: 2rem; }
    }

    .badge {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1><i class="fas fa-route"></i> Mapquest Route Finder</h1>
      <p>Get accurate driving directions, distances, times & fuel estimates</p>
    </div>

    <div class="input-section">
      <div class="input-group">
        <div class="input-field">
          <label>Starting Location</label>
          <input type="text" id="from" placeholder="e.g. New York, NY">
          <i class="fas fa-map-marker-alt"></i>
        </div>
        <div class="input-field">
          <label>Destination</label>
          <input type="text" id="to" placeholder="e.g. Los Angeles, CA">
          <i class="fas fa-flag-checkered"></i>
        </div>
      </div>

      <div class="btn-group">
        <button class="btn btn-primary" id="getRouteBtn" onclick="getRoute()">
          <i class="fas fa-search"></i> Find Route
        </button>
        <button class="btn btn-secondary" onclick="clearTable()">
          <i class="fas fa-trash"></i> Clear All
        </button>
      </div>

      <div id="error-msg" class="error-msg"></div>
      <div id="success-msg" class="success-msg"></div>
    </div>

    <div class="stats-grid" id="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="total-runs">0</div>
        <div class="stat-label">Total Routes</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="avg-distance">0 mi</div>
        <div class="stat-label">Avg Distance</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="avg-time">0h 0m</div>
        <div class="stat-label">Avg Time</div>
      </div>
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Calculating the best route...</p>
    </div>

    <div class="results-section">
      <div class="table-container" id="results-table">
        <div class="table-header">
          <h3 style="margin: 0; display: inline-block; color: white;">
            <i class="fas fa-table"></i> Route History
          </h3>
          <span id="run-count" style="float: right; opacity: 0.9; font-weight: 500;"></span>
        </div>
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>From</th>
              <th>To</th>
              <th>Distance</th>
              <th>Time</th>
              <th>Fuel</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const API_KEY = 'Ca04kVNLR7kqwbv8v7qMJMPBVKAcPUey';
    let runCount = 0;
    let totalDistance = 0;
    let totalTimeMinutes = 0;

    // Enter key support
    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('from').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') getRoute();
      });
      document.getElementById('to').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') getRoute();
      });
    });

    async function getRoute() {
      const from = document.getElementById('from').value.trim();
      const to = document.getElementById('to').value.trim();
      const errorMsg = document.getElementById('error-msg');
      const successMsg = document.getElementById('success-msg');
      const loading = document.getElementById('loading');
      const getRouteBtn = document.getElementById('getRouteBtn');

      // Hide messages
      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';

      if (!from || !to) {
        showError('Please enter both starting location and destination.');
        return;
      }

      // Show loading
      getRouteBtn.disabled = true;
      getRouteBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Searching...';
      loading.style.display = 'block';

      try {
        const encodedFrom = encodeURIComponent(from);
        const encodedTo = encodeURIComponent(to);
        const url = `https://www.mapquestapi.com/directions/v2/route?key=${API_KEY}&from=${encodedFrom}&to=${encodedTo}`;

        const response = await fetch(url);
        
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }

        const data = await response.json();
        
        loading.style.display = 'none';

        if (data.info.statuscode !== 0) {
          showError(`No route found: ${data.info.messages ? data.info.messages[0] : 'Unknown error'}`);
          return;
        }

        const route = data.route;
        runCount++;
        
        // Update totals
        totalDistance += route.distance || 0;
        const timeParts = (route.formattedTime || '0:00').split(':');
        totalTimeMinutes += parseInt(timeParts[0]) * 60 + parseInt(timeParts[1]);

        // Add row and update UI
        addTableRow(from, to, route);
        updateStats();
        
        // Show success
        successMsg.textContent = `Route ${runCount} added successfully!`;
        successMsg.style.display = 'block';

      } catch (error) {
        loading.style.display = 'none';
        console.error('Error:', error);
        showError('Failed to fetch route. Please check your connection or try different locations.');
      } finally {
        // Reset button
        getRouteBtn.disabled = false;
        getRouteBtn.innerHTML = '<i class="fas fa-search"></i> Find Route';
      }
    }

    function addTableRow(from, to, route) {
      const tbody = document.getElementById('table-body');
      const row = document.createElement('tr');
      
      const distance = route.distance ? route.distance.toFixed(2) + ' mi' : 'N/A';
      const fuel = route.fuelUsed ? route.fuelUsed.toFixed(2) + ' gal' : 'N/A';
      const statusClass = route.distance ? 'status-success' : 'status-error';
      const statusText = route.distance ? 'Success' : 'No Route';

      row.innerHTML = `
        <td><span class="badge">${runCount}</span></td>
        <td style="font-weight: 500;">${from}</td>
        <td style="color: #3b82f6; font-weight: 500;">${to}</td>
        <td><strong>${distance}</strong></td>
        <td>${route.formattedTime || 'N/A'}</td>
        <td>${fuel}</td>
        <td><span class="${statusClass}"><i class="fas fa-check-circle"></i> ${statusText}</span></td>
      `;
      
      tbody.insertBefore(row, tbody.firstChild); // Add to top
      document.getElementById('results-table').style.display = 'block';
      document.getElementById('stats-grid').style.display = 'grid';
      updateRunCount();
    }

    function updateStats() {
      document.getElementById('total-runs').textContent = runCount;
      
      if (runCount > 0) {
        const avgDistance = (totalDistance / runCount).toFixed(1);
        const avgTimeHours = Math.floor(totalTimeMinutes / runCount / 60);
        const avgTimeMins = Math.floor(totalTimeMinutes / runCount % 60);
        
        document.getElementById('avg-distance').textContent = avgDistance + ' mi';
        document.getElementById('avg-time').textContent = avgTimeHours + 'h ' + avgTimeMins + 'm';
      }
    }

    function updateRunCount() {
      document.getElementById('run-count').textContent = `${runCount} routes`;
    }

    function showError(message) {
      const errorMsg = document.getElementById('error-msg');
      errorMsg.textContent = message;
      errorMsg.style.display = 'block';
    }

    function clearTable() {
      runCount = 0;
      totalDistance = 0;
      totalTimeMinutes = 0;
      document.getElementById('table-body').innerHTML = '';
      document.getElementById('results-table').style.display = 'none';
      document.getElementById('stats-grid').style.display = 'none';
      document.getElementById('from').value = '';
      document.getElementById('to').value = '';
      document.getElementById('error-msg').style.display = 'none';
      document.getElementById('success-msg').style.display = 'none';
    }
  </script>
</body>
</html>
